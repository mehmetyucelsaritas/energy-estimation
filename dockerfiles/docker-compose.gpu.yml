services:
  energy-estimation:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.gpu
      args:
        UID: "${HOST_UID:-1000}"
        GID: "${HOST_GID:-1000}"
    image: energy-estimation:gpu-dev
    container_name: energy-estimation-gpu0
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace/energy-estimation
    volumes:
      - ../:/workspace/energy-estimation
    environment:
      HOME: /tmp
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONPATH: /workspace/energy-estimation
    gpus: all
    command: bash /workspace/energy-estimation/dockerfiles/docker_entrypoint.sh
